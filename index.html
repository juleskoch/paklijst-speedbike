<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Paklijst" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Paklijst</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg class="sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" />
      </symbol>
      <symbol id="icon-reset" viewBox="0 0 24 24">
        <path d="M7.4 7.1A7 7 0 1 1 5 12" />
        <path d="M4.8 4.8v4.9h4.9" />
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <rect x="8" y="8" width="11" height="11" rx="2" />
        <path d="M5 15V6.8A1.8 1.8 0 0 1 6.8 5H15" />
      </symbol>
      <symbol id="icon-pencil" viewBox="0 0 24 24">
        <path d="m4.8 16.7-.7 3.2 3.2-.7L18.8 7.7a2.2 2.2 0 0 0 0-3.1 2.2 2.2 0 0 0-3.1 0Z" />
        <path d="m14.4 5.9 3.7 3.7" />
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M5 7h14" />
        <path d="M9 7V5.6A1.6 1.6 0 0 1 10.6 4h2.8A1.6 1.6 0 0 1 15 5.6V7" />
        <path d="m7 7 .8 12A2.2 2.2 0 0 0 10 21h4a2.2 2.2 0 0 0 2.2-2L17 7" />
        <path d="M10 11v6M14 11v6" />
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m5 12.5 4.2 4.2L19.5 6.5" />
      </symbol>
      <symbol id="icon-x" viewBox="0 0 24 24">
        <path d="M6 6l12 12M18 6 6 18" />
      </symbol>
    </svg>

    <div class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <p>Speed pedelec</p>
          <h1>Paklijst</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="resetChecksBtn" type="button" aria-label="Alle vinkjes leegmaken" title="Alle vinkjes leegmaken">
            <svg class="icon"><use href="#icon-reset"></use></svg>
          </button>
          <button class="icon-button filled" id="addTabBtn" type="button" aria-label="Tabblad toevoegen" title="Tabblad toevoegen">
            <svg class="icon"><use href="#icon-plus"></use></svg>
          </button>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Tabbladen">
        <div class="tabs" id="tabs" role="tablist"></div>
      </nav>

      <main class="content">
        <section class="list-summary" aria-live="polite">
          <div>
            <h2 id="activeTabTitle"></h2>
            <p id="progressText"></p>
          </div>
          <div class="summary-actions">
            <button class="icon-button subtle" id="editTabBtn" type="button" aria-label="Tabblad hernoemen" title="Tabblad hernoemen">
              <svg class="icon"><use href="#icon-pencil"></use></svg>
            </button>
            <button class="icon-button subtle" id="duplicateTabBtn" type="button" aria-label="Tabblad dupliceren" title="Tabblad dupliceren">
              <svg class="icon"><use href="#icon-copy"></use></svg>
            </button>
            <button class="icon-button subtle danger" id="deleteTabBtn" type="button" aria-label="Tabblad verwijderen" title="Tabblad verwijderen">
              <svg class="icon"><use href="#icon-trash"></use></svg>
            </button>
          </div>
        </section>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <section class="categories" id="categories" aria-label="Categorieën"></section>
      </main>

      <footer class="action-bar">
        <button class="primary-action" id="addCategoryBtn" type="button">
          <svg class="icon"><use href="#icon-plus"></use></svg>
          <span>Categorie</span>
        </button>
      </footer>
    </div>

    <dialog class="sheet-dialog" id="sheetDialog">
      <form class="sheet" id="sheetForm" method="dialog">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="sheet-header">
          <button class="text-button" id="cancelSheetBtn" type="button">Annuleer</button>
          <h2 id="sheetTitle"></h2>
          <button class="text-button strong" id="saveSheetBtn" type="submit">Bewaar</button>
        </div>
        <label class="field" id="nameField">
          <span id="nameLabel">Naam</span>
          <input id="nameInput" name="name" type="text" autocomplete="off" />
        </label>
      </form>
    </dialog>

    <script type="module" src="app.js"></script>
  </body>
</html>
